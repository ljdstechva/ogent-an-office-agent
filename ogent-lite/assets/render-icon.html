<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ogent icon renderer</title>
  <script>
    const requestedSize = Number(new URLSearchParams(location.search).get("size"));
    const renderSize = [16, 24, 32, 48, 64, 128, 256].includes(requestedSize)
      ? requestedSize
      : 256;
    document.documentElement.style.setProperty("--render-size", `${renderSize}px`);
  </script>
  <style>
    html, body {
      width: var(--render-size);
      height: var(--render-size);
      margin: 0;
      overflow: hidden;
      background: transparent;
    }

    svg {
      display: block;
      width: var(--render-size);
      height: var(--render-size);
    }
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" aria-hidden="true">
    <defs>
      <linearGradient id="ogent-gradient" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#17324d"/>
        <stop offset="1" stop-color="#0d9488"/>
      </linearGradient>
    </defs>
    <rect x="8" y="8" width="240" height="240" rx="56" fill="url(#ogent-gradient)"/>
    <circle cx="128" cy="120" r="66" fill="none" stroke="#ffffff" stroke-width="30"/>
    <circle cx="175" cy="167" r="16" fill="#14b8a6" stroke="#ffffff" stroke-width="3"/>
  </svg>
</body>
</html>
